<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
  </head>
  <body>
    <script>
      async function checkAuth() {
        try {
          const res = await fetch(
            "https://authbridge-stage.mymemorystore.in/oauth2/portal/verify",
            {
              credentials: "include",
            }
          );

          if (res.status !== 200) {
            window.location.href = "/login/";
            return;
          }

          // load CMS
          const script = document.createElement("script");
          script.src = "https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js";
          script.defer = true;
          document.body.appendChild(script);
        } catch (e) {
          window.location.href = "/login/";
        }
      }

      checkAuth();
    </script>
  </body>
</html>
